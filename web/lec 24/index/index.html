<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <style>
        .box{
            height: 400px;
            width: 400px;
            background-color: rgb(255, 255, 0);
            border: 2px solid black;
            /* transition-property: all;
            transition-duration: 1s;
            transition-delay: 0s;
            transition-timing-function: cubic-bezier(0.075, 0.82, 0.165, 1); */

            /* shorthandnotation */
            transition: width 1s, height 2s,background-color 2s cubic-bezier(0.075, 0.82, 0.165, 1);
          
            /* transition: all 2s cubic-bezier(0.075, 0.82, 0.165, 1) .5s; */
        }

        .box:hover{
            width: 600px;
            background-color: rgba(72, 0, 255, 0.872);
            height: 600px;
        }
    </style>
</head>
<body>
    <div class="box">

    </div>
</body>
</html>

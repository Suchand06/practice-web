<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        .container{
            width: 100vw;
            height: 100vh;
            background-color: beige;
            border: 2px solid black;
        }
        .box{
            width: 350px;
            height: 80px;
            top: 0;
            background-color: blue;
            border-radius: 30px;
            border: 1px solid black;
            margin: 10px;
            position:relative;
            animation: 4s linear 1s infinite alternate-reverse none running rightMovement;
        }
        .box2{
            width: 350px;
            height: 80px;
            background-color: rgb(0, 255, 76);
            border-radius: 30px;
            top: 540px;
            border: 1px solid black;
            position: relative;
            animation: 4s linear 1s infinite alternate none running rightMovement;
        }
        #circle{
            width: 20px;
            height: 20px;
            border-radius: 400px;
            background-color: rgb(0, 255, 76);
            border-radius: 30px;
            border: 1px solid black;
            position: relative;
            animation: 4s linear 1s infinite alternate none running bottom;
            
        }

        @keyframes rightMovement {
            from{
                left: 1350px;
                
            }
            to {
                
                left: 0;
            }
        }
        @keyframes bottom {
           0% {
                top:0%;
                left: 0%;
           }
           20% {
                top:20%;
                left: 90%;
           }
           60% {
                top: 80%;
                left: 30%;
           }    
           100% {
                top: 100%;
                left: 100%;
           }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">

        </div>
        <div id="circle">

        </div>
        <div class="box2">

        

        </div>
    </div>
    
</body>
</html>
